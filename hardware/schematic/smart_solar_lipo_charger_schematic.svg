<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .box { fill:#f8fbf2; stroke:#214d2a; stroke-width:2; }
      .pow { fill:#fff6e8; stroke:#915900; stroke-width:2; }
      .mcu { fill:#eef4ff; stroke:#1c4d99; stroke-width:2; }
      .sig { stroke:#1f2937; stroke-width:2; fill:none; }
      .txt { font-family:Arial, sans-serif; font-size:18px; fill:#111827; }
      .title { font-family:Arial, sans-serif; font-size:28px; font-weight:700; fill:#111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>
  <text x="40" y="48" class="title">Smart Solar Li-Po Charger (STM8S103F3P6)</text>

  <rect x="40" y="120" width="190" height="90" class="pow"/>
  <text x="62" y="172" class="txt">J1 Solar 5V/200mA</text>

  <rect x="280" y="110" width="220" height="110" class="pow"/>
  <text x="310" y="145" class="txt">D1 SS14 + C1 220uF</text>
  <text x="330" y="180" class="txt">Input Front-End</text>

  <rect x="560" y="80" width="280" height="170" class="pow"/>
  <text x="604" y="122" class="txt">Buck Power Stage</text>
  <text x="588" y="156" class="txt">Q1 AO3400 + L1 22uH</text>
  <text x="606" y="190" class="txt">D2 SS14 + C2 470uF</text>

  <rect x="910" y="120" width="260" height="90" class="pow"/>
  <text x="946" y="172" class="txt">J2 Li-Po 3.7V / 4.2V</text>

  <rect x="560" y="340" width="300" height="230" class="mcu"/>
  <text x="616" y="382" class="txt">STM8S103F3P6</text>
  <text x="598" y="414" class="txt">PWM + ADC + Safety</text>
  <text x="592" y="446" class="txt">SWIM Programming</text>

  <rect x="280" y="330" width="220" height="110" class="box"/>
  <text x="322" y="370" class="txt">Solar Divider</text>
  <text x="338" y="402" class="txt">R1/R2 -> ADC</text>

  <rect x="280" y="500" width="220" height="110" class="box"/>
  <text x="316" y="540" class="txt">Battery Divider</text>
  <text x="338" y="572" class="txt">R3/R4 -> ADC</text>

  <rect x="910" y="320" width="260" height="120" class="box"/>
  <text x="956" y="364" class="txt">Current Sense</text>
  <text x="942" y="398" class="txt">R5 0.1R + U2 (opt)</text>

  <rect x="910" y="500" width="260" height="90" class="box"/>
  <text x="966" y="550" class="txt">J3 SWIM Header</text>

  <path d="M230 165 L280 165" class="sig"/>
  <path d="M500 165 L560 165" class="sig"/>
  <path d="M840 165 L910 165" class="sig"/>

  <path d="M670 250 L670 340" class="sig"/>
  <path d="M500 385 L560 385" class="sig"/>
  <path d="M500 555 L560 555" class="sig"/>
  <path d="M910 380 L860 380" class="sig"/>
  <path d="M910 545 L860 545" class="sig"/>

  <text x="705" y="300" class="txt">PWM_GATE</text>
  <text x="510" y="370" class="txt">ADC_SOLAR</text>
  <text x="510" y="540" class="txt">ADC_BATT</text>
  <text x="865" y="365" class="txt">ADC_CURR</text>
  <text x="864" y="530" class="txt">SWIM/NRST</text>
</svg>
